services:
  - type: web
    name: taeallum-platform
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: taeallum-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: taeallum-db
    plan: free
